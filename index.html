<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasumični Ajet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h3 id="naslov">Nasumični Ajet</h3>
    <p id="deskripcija">Generiši jedan od preko 5.500 ajeta iz časnog Kur'ana.</p>

    
    <div class="divizija">
        <p id="ajet"></p>
    </div>
    
   <div class="jezik-kontejner">
    <select id="izborJezika" onchange="osvjeziPrevoditelje()">
        <option value="bs">Bosanski</option>
        <option value="en">English</option>
    </select>

    <select id="izborPrevodioca" onchange="promjenaPrevodioca()">
        </select>
</div>

    <div class="dugme-kontejner">
        <button id = "dugme", onclick="prikaziAjet()">Generiši ajet</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
